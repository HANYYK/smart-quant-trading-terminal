{% extends "base.html" %}

{% block title %}板块轮动 - 智能量化交易终端{% endblock %}

{% block extra_css %}
<style>
.sector-card {
    background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s;
}
.sector-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}
.index-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.03);
    transition: all 0.2s;
}
.index-item:hover {
    background: rgba(255,255,255,0.08);
}
.index-name {
    font-weight: 600;
    color: #fff;
}
.index-code {
    font-size: 0.8rem;
    color: #888;
}
.change-up {
    color: #ef5350 !important;
}
.change-down {
    color: #26a69a !important;
}
.change-flat {
    color: #9ca3af !important;
}
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('dashboard.index') }}">行情中心</a></li>
            <li class="breadcrumb-item active">板块轮动</li>
        </ol>
    </nav>

    <div class="row mb-4">
        <div class="col-12">
            <h2 class="text-light mb-3">
                <i class="fas fa-chart-pie text-info me-2"></i>板块轮动
            </h2>
            <p class="text-muted">监控主要指数表现，把握市场热点切换</p>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="sector-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0"><i class="fas fa-list me-2"></i>主要指数</h5>
                    <button class="btn btn-sm btn-outline-light" id="refresh-sectors">
                        <i class="fas fa-sync-alt me-1"></i>刷新
                    </button>
                </div>
                <div class="row" id="index-grid">
                    <div class="col-12 text-center py-4">
                        <div class="spinner-border text-danger" role="status"></div>
                        <p class="mt-2 text-muted">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="sector-card">
                <div class="card-header bg-success">
                    <h5 class="mb-0 text-white"><i class="fas fa-arrow-up me-2"></i>涨幅排行</h5>
                </div>
                <div class="card-body">
                    <div id="gainers-chart" style="height: 280px;"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="sector-card">
                <div class="card-header bg-danger">
                    <h5 class="mb-0 text-white"><i class="fas fa-arrow-down me-2"></i>跌幅排行</h5>
                </div>
                <div class="card-body">
                    <div id="losers-chart" style="height: 280px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="sector-card">
                <div class="card-header bg-info">
                    <h5 class="mb-0 text-white"><i class="fas fa-chart-bar me-2"></i>指数涨跌幅对比</h5>
                </div>
                <div class="card-body">
                    <div id="compare-chart" style="height: 300px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
(function() {
    "use strict";

    var gainersChart, losersChart, compareChart;
    var sectorData = [];

    function $(id) { return document.getElementById(id); }

    function initCharts() {
        gainersChart = echarts.init($('gainers-chart'));
        losersChart = echarts.init($('losers-chart'));
        compareChart = echarts.init($('compare-chart'));

        window.addEventListener('resize', function() {
            gainersChart.resize();
            losersChart.resize();
            compareChart.resize();
        });
    }

    function loadSectorData() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/stock/api/sector', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var response = JSON.parse(xhr.responseText);
                        if (response.success && response.data.length > 0) {
                            sectorData = response.data;
                            renderIndexGrid(response.data);
                            renderCharts(response.data);
                        } else {
                            $('index-grid').innerHTML = '<div class="col-12 text-center text-muted">暂无数据</div>';
                        }
                    } catch (e) {
                        $('index-grid').innerHTML = '<div class="col-12 text-center text-danger">加载失败: ' + e.message + '</div>';
                    }
                } else {
                    $('index-grid').innerHTML = '<div class="col-12 text-center text-danger">请求失败</div>';
                }
            }
        };
        xhr.send();
    }

    function renderIndexGrid(data) {
        var html = '';
        var rowCount = Math.ceil(data.length / 3);

        for (var r = 0; r < rowCount; r++) {
            html += '<div class="row mb-2">';
            for (var c = 0; c < 3; c++) {
                var idx = r * 3 + c;
                if (idx < data.length) {
                    var item = data[idx];
                    var changeClass = item.change_percent > 0 ? 'change-up' : item.change_percent < 0 ? 'change-down' : 'change-flat';
                    var arrow = item.change_percent > 0 ? '▲' : item.change_percent < 0 ? '▼' : '■';
                    var statusBg = item.status === 'up' ? 'bg-danger' : item.status === 'down' ? 'bg-success' : 'bg-secondary';

                    html += '<div class="col-md-4 col-sm-6 mb-2">' +
                        '<div class="index-item">' +
                            '<div>' +
                                '<div class="index-name text-info">' + item.name + '</div>' +
                                '<div class="index-code">' + item.code + '</div>' +
                            '</div>' +
                            '<div class="text-end">' +
                                '<div class="fw-bold ' + changeClass + '">' + arrow + ' ' + Math.abs(item.change_percent).toFixed(2) + '%</div>' +
                                '<span class="badge ' + statusBg + '">' + item.close.toFixed(2) + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }
            }
            html += '</div>';
        }

        $('index-grid').innerHTML = html;
    }

    function renderCharts(data) {
        var sorted = data.slice().sort(function(a, b) { return b.change_percent - a.change_percent; });
        var gainers = sorted.filter(function(x) { return x.change_percent > 0; }).slice(0, 3);
        var losers = sorted.filter(function(x) { return x.change_percent < 0; }).sort(function(a, b) { return a.change_percent - b.change_percent; }).slice(0, 3);

        var gainerOption = {
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '10%', bottom: '10%', top: '10%' },
            xAxis: {
                type: 'category',
                data: gainers.map(function(x) { return x.name; }),
                axisLabel: { color: '#fff', fontSize: 12 }
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#fff', formatter: '{value}%' }
            },
            series: [{
                type: 'bar',
                data: gainers.map(function(x) {
                    return {
                        value: x.change_percent,
                        itemStyle: { color: '#ef5350', borderRadius: [4, 4, 0, 0] }
                    };
                }),
                label: { show: true, position: 'top', formatter: '{c}%', color: '#ef5350' },
                barWidth: '50%'
            }]
        };

        var loserOption = {
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '10%', bottom: '10%', top: '10%' },
            xAxis: {
                type: 'category',
                data: losers.map(function(x) { return x.name; }),
                axisLabel: { color: '#fff', fontSize: 12 }
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#fff', formatter: '{value}%' }
            },
            series: [{
                type: 'bar',
                data: losers.map(function(x) {
                    return {
                        value: x.change_percent,
                        itemStyle: { color: '#26a69a', borderRadius: [4, 4, 0, 0] }
                    };
                }),
                label: { show: true, position: 'top', formatter: '{c}%', color: '#26a69a' },
                barWidth: '50%'
            }]
        };

        var compareOption = {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' }
            },
            legend: {
                data: ['涨跌幅'],
                textStyle: { color: '#aaa' }
            },
            grid: { left: '3%', right: '5%', bottom: '15%', top: '10%' },
            xAxis: {
                type: 'category',
                data: data.map(function(x) { return x.name; }),
                axisLabel: { color: '#fff', rotate: 30, fontSize: 11 }
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#fff', formatter: '{value}%' }
            },
            series: [{
                name: '涨跌幅',
                type: 'bar',
                data: data.map(function(x) {
                    return {
                        value: x.change_percent,
                        itemStyle: {
                            color: x.change_percent >= 0 ? '#ef5350' : '#26a69a'
                        }
                    };
                }),
                label: {
                    show: true,
                    position: 'top',
                    formatter: function(params) {
                        return params.value.toFixed(1) + '%';
                    },
                    color: '#888',
                    fontSize: 10
                }
            }]
        };

        gainersChart.setOption(gainerOption);
        losersChart.setOption(loserOption);
        compareChart.setOption(compareOption);
    }

    $('refresh-sectors').addEventListener('click', function() {
        $('refresh-sectors').disabled = true;
        $('index-grid').innerHTML = '<div class="col-12 text-center py-4"><div class="spinner-border text-danger"></div><p class="mt-2 text-muted">刷新中...</p></div>';
        loadSectorData();
        setTimeout(function() { $('refresh-sectors').disabled = false; }, 1000);
    });

    document.addEventListener('DOMContentLoaded', function() {
        initCharts();
        loadSectorData();
        setInterval(loadSectorData, 60000);
    });
})();
</script>
{% endblock %}
